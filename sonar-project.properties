# ═══════════════════════════════════════════════════════════
# SonarQube Configuration — साखरपुडा Engagement Website
# ═══════════════════════════════════════════════════════════
# Run: export SONAR_TOKEN=your_token && sonar-scanner
# Docs: https://docs.sonarsource.com/sonarqube-server/analyzing-source-code/scanners/sonarscanner/
# SonarCloud: https://sonarcloud.io
# Generate token: https://sonarcloud.io/account/security/
# ═══════════════════════════════════════════════════════════

# ── Project Identity ──────────────────────────────────────
sonar.projectKey=engagement-web
sonar.projectName=साखरपुडा - Engagement Invitation
sonar.projectVersion=1.0

# ── SonarCloud ────────────────────────────────────────────
sonar.host.url=https://sonarcloud.io
sonar.organization=kulkahr
sonar.qualitygate=Engagement_Web_Gate

# ── Source Directories ────────────────────────────────────
sonar.sources=src,scripts

# ── TypeScript Configuration ──────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.file.suffixes=.js

# ── Exclusions ────────────────────────────────────────────
# Exclude Svelte files — SonarQube doesn't natively parse .svelte syntax.
# The TypeScript logic inside .svelte <script> tags won't be analyzed.
sonar.exclusions=**/*.svelte

# Exclude auto-generated files and build artifacts
sonar.exclusions+=,**/gallery-photos.ts

# ── Test Coverage (optional — enable after setting up Vitest) ──
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.test.exclusions=**/*.spec.ts,**/*.test.ts

# ── Encoding ──────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
